// ── DOM HELPERS ───────────────────────────────────────────────────────────────
function div(style,children){
  var d=document.createElement("div");
  if(style) Object.assign(d.style,style);
  if(children) [].concat(children).forEach(function(c){
    if(c!=null) d.appendChild(typeof c==="string"?document.createTextNode(c):c);
  });
  return d;
}
function el(tag,style,text){
  var e=document.createElement(tag);
  if(style) Object.assign(e.style,style);
  if(text!=null) e.textContent=text;
  return e;
}
function logoImg(h){
  // H SVG logo
  var i=document.createElement("img");
  i.src=H_LOGO; i.alt="Isabella Intelligence System";
  i.style.height=h+"px"; i.style.display="block";
  return i;
}
function miLogo(h){
  var i=document.createElement("img");
  i.src=MI_LOGO; i.alt="Maison Isabella";
  i.style.height=h+"px"; i.style.display="block";
  return i;
}
function btn(text,style,onClick){
  var b=document.createElement("button");
  Object.assign(b.style,{
    width:"100%",padding:"15px",background:BTN,color:"#F5E6C8",
    border:"none",borderRadius:"10px",fontSize:"15px",fontWeight:"600",
    cursor:"pointer",fontFamily:"inherit",letterSpacing:"0.3px",
    transition:"opacity 0.15s"
  });
  if(style) Object.assign(b.style,style);
  b.textContent=text;
  b.addEventListener("click",onClick);
  return b;
}
function optionBtn(label,onClick){
  var b=document.createElement("div");
  Object.assign(b.style,{
    padding:"13px 18px",marginBottom:"9px",borderRadius:"10px",
    border:"1px solid "+BOR,background:CARD,color:MUT,

    display:"flex",alignItems:"center",gap:"12px",transition:"all 0.15s"
  });
  var dot=el("div",{width:"6px",height:"6px",borderRadius:"50%",background:BOR,flexShrink:"0"});
  var txt=document.createTextNode(label);
  b.appendChild(dot); b.appendChild(txt);
  b.addEventListener("mouseenter",function(){
    b.style.borderColor=GOLD+"60"; b.style.background=GOLD+"10"; b.style.color=DARK;
  });
  b.addEventListener("mouseleave",function(){
    b.style.borderColor=BOR; b.style.background=CARD; b.style.color=MUT;

  b.addEventListener("click",onClick);
  return b;
}
function progressBar(pct,label){
  return div({marginBottom:"20px"},[
    div({display:"flex",justifyContent:"space-between",marginBottom:"6px"},[
      el("span",{fontSize:"10px",letterSpacing:"2px",color:GOLD,fontWeight:"700",textTransform:"uppercase"},label),

    ]),
    div({height:"3px",background:BOR,borderRadius:"999px",overflow:"hidden"},[
      div({height:"100%",width:pct+"%",background:"linear-gradient(90deg,"+GOLD+",#DEB96A)",
           borderRadius:"999px",transition:"width 0.4s"})
    ])
  ]);
}
function renderMD(text){
  var wrap=div();
  if(!text) return wrap;
  text.split("\n").forEach(function(line){
    var n;
    if(line.startsWith("## ")) n=el("h2",{fontSize:"14px",fontWeight:"700",color:GOLD,margin:"20px 0 8px",paddingBottom:"5px",borderBottom:"1px solid "+BOR},line.slice(3));
    else if(line.startsWith("### ")) n=el("h3",{fontSize:"13px",fontWeight:"600",color:DARK,margin:"14px 0 4px"},line.slice(4));
    else if(line.startsWith("**")&&line.endsWith("**")) n=el("p",{fontSize:"13px",fontWeight:"700",color:DARK,margin:"6px 0"},line.slice(2,-2));
    else if(line.startsWith("- ")){
      n=div({display:"flex",gap:"8px",marginBottom:"5px"},[
        el("span",{color:GOLD,fontWeight:"700",flexShrink:"0"},"·"),
        el("span",{fontSize:"13px",color:"#5a4a38",lineHeight:"1.65"},line.slice(2))
      ]);
    }
    else if(line.trim()==="") n=div({height:"4px"});
    else n=el("p",{fontSize:"13px",color:"#5a4a38",lineHeight:"1.7",margin:"1px 0"},line);
    if(n) wrap.appendChild(n);
  });
  return wrap;
}

function drawLogin(){

    outline:"none",fontFamily:"inherit",boxSizing:"border-box",letterSpacing:"0.3px"});
  emailInp.type="email"; emailInp.placeholder="o.teu@email.com";
  emailInp.addEventListener("input",function(e){email=e.target.value;});

    outline:"none",fontFamily:"inherit",boxSizing:"border-box"});
  passInp.type="password"; passInp.placeholder="Password";
  passInp.addEventListener("input",function(e){pass=e.target.value;});
  passInp.addEventListener("keydown",function(e){if(e.key==="Enter")doLogin();});

  function doLogin(){
    var u=USERS.find(function(u){

  // Enter button
  var loginBtn=document.createElement("button");
  Object.assign(loginBtn.style,{width:"100%",padding:"16px",background:BTN,color:"#F5E6C8",
    border:"none",borderRadius:"8px",fontSize:"14px",fontWeight:"600",
    cursor:"pointer",fontFamily:"inherit",letterSpacing:"0.5px",marginTop:"8px"});
  loginBtn.textContent="Entrar →";
  loginBtn.addEventListener("click",doLogin);

  return div({minHeight:"100vh",background:BG,display:"flex",alignItems:"center",
              justifyContent:"center",padding:"32px 20px"},[
    div({width:"100%",maxWidth:"380px"},[
      // Logos centrados
      div({textAlign:"center",marginBottom:"4px"},miEl),
      div({textAlign:"center",marginBottom:"0px"},hEl),
      // Divider com nome
      divLine,
      // Form fields sem card — apenas campos
      div({marginBottom:"12px"},[
        el("label",{display:"block",fontSize:"10px",fontWeight:"600",color:MUT,
                    letterSpacing:"1.5px",textTransform:"uppercase",marginBottom:"8px"},"Email"),
        emailInp
      ]),
      div({marginBottom:"20px"},[
        el("label",{display:"block",fontSize:"10px",fontWeight:"600",color:MUT,

          div({background:CARD,border:"1px solid "+BOR,borderRadius:"12px",padding:"14px"},[
            el("div",{fontSize:"9px",color:"#7a9a8a",fontWeight:"700",letterSpacing:"2px",
                      textTransform:"uppercase",marginBottom:"5px"},"Fase 2"),
            el("div",{fontSize:"13px",fontWeight:"600",color:DARK,marginBottom:"2px"},"Subtipos"),
            el("div",{fontSize:"11px",color:MUT},"Perfil refinado")

          div({background:CARD,border:"1px solid "+BOR,borderRadius:"12px",padding:"14px"},[
            el("div",{fontSize:"9px",color:"#8a7a9a",fontWeight:"700",letterSpacing:"2px",
                      textTransform:"uppercase",marginBottom:"5px"},"Resultado"),
            el("div",{fontSize:"13px",fontWeight:"600",color:DARK,marginBottom:"2px"},"Perfil Completo"),
            el("div",{fontSize:"11px",color:MUT},"Branding emocional")
          ])
        ]),
        div({display:"flex",gap:"10px",justifyContent:"center"},[
          btn("← Voltar",{background:"none",border:"1px solid "+BOR,color:MUT,

              function(){set({screen:"home"});}),
          btn("Iniciar →",{width:"auto",padding:"14px 36px"},
              function(){set({qFase:"f1"});})
        ])
      ])
    ]);
  }

  // FASE 1
  if(S.qFase==="f1"){
    var ak=ARQS_ORDER[S.qAi], ad=AD[ak]||{};
    var done=Object.values(S.qR1).reduce(function(s,v){return s+v.length;},0);
    var pct=Math.round((done/(ARQS_ORDER.length*10))*100);
    var q=(ad.perguntas||[])[S.qPi]||"";

    var bar=progressBar(pct,(ad.nome||ak)+" · "+(S.qPi+1)+"/"+(ad.perguntas||[]).length);

    var opts=div();
    OF1.forEach(function(op){
      opts.appendChild(optionBtn(op.label,function(){
        var ak2=ARQS_ORDER[S.qAi];
        var nr=Object.assign({},S.qR1);
        nr[ak2]=(nr[ak2]||[]).concat(op.val);
        var ad2=AD[ak2]||{};
        if(S.qPi+1<(ad2.perguntas||[]).length){set({qR1:nr,qPi:S.qPi+1});}
        else if(S.qAi+1<ARQS_ORDER.length){set({qR1:nr,qAi:S.qAi+1,qPi:0});}
        else{
          var pts=ARQS_ORDER.map(function(k){
            var d=AD[k]||{};
            var tot=(nr[k]||[]).reduce(function(a,b){return a+b;},0);
            return {key:k,nome:d.nome||k,pct:Math.round((tot/((d.perguntas||[]).length*10))*100)};
          }).sort(function(a,b){return b.pct-a.pct;});
          set({qR1:nr,qTop3:pts.slice(0,3),qDom:pts[0],qFase:"f2"});

             padding:"clamp(24px,5vw,40px)",boxShadow:"0 4px 24px rgba(26,10,0,0.06)"},[
          el("div",{fontSize:"10px",letterSpacing:"2.5px",color:GOLD,fontWeight:"700",
                    textTransform:"uppercase",marginBottom:"12px"},"Fase 1 — "+(ad.nome||ak)),

  // FASE 2
  if(S.qFase==="f2"){

    var subs=(dom&&AD[dom.key]&&AD[dom.key].subtipos)||[];
    var allQ=[];
    subs.forEach(function(s){(s.afirmacoes||[]).forEach(function(a){allQ.push({sub:s.nome,txt:a});});});
    var f2i=Object.values(S.qR2).reduce(function(s,v){return s+v.length;},0);
    var q2=allQ[f2i];
    var pct2=allQ.length>0?Math.round((f2i/allQ.length)*100):0;

    function ansF2(val){
      if(!q2) return;
      var nf2=Object.assign({},S.qR2);
      nf2[q2.sub]=(nf2[q2.sub]||[]).concat(val);
      if(f2i+1>=allQ.length){
        var ponts=subs.map(function(s){
          var tot=(nf2[s.nome]||[]).reduce(function(a,b){return a+b;},0);
          return Object.assign({},s,{pct:Math.round((tot/((s.afirmacoes||[]).length*10))*100)});
        }).sort(function(a,b){return b.pct-a.pct;});
        set({qR2:nf2,qSub:ponts[0],qFase:"resultado"});

    var opts2=div();

      b.appendChild(el("span",{fontSize:"9px",color:GOLD,fontWeight:"700",
                               letterSpacing:"1.5px",textTransform:"uppercase"},
                       i===0?"Dom ":i===1?"2º ":"3º "));
      b.appendChild(el("span",{fontSize:"11px",color:MUT},t.nome+" · "+t.pct+"%"));
      badges.appendChild(b);

    var bar2=progressBar(pct2,"Fase 2 · Subtipos · "+(dom?dom.nome:""));

    return div({minHeight:"100vh",background:BG,padding:"24px 20px 80px"},[

        q2?div({background:CARD,borderRadius:"18px",border:"1px solid "+BOR,
                padding:"clamp(24px,5vw,40px)",boxShadow:"0 4px 24px rgba(26,10,0,0.06)"},[
          el("div",{fontSize:"10px",letterSpacing:"2.5px",color:GOLD,fontWeight:"700",
                    textTransform:"uppercase",marginBottom:"12px"},"Subtipo · "+q2.sub),
          el("p",{fontFamily:"'Playfair Display',serif",fontSize:"clamp(16px,3vw,20px)",
                  color:DARK,lineHeight:"1.65",margin:"0 0 28px"},'"'+q2.txt+'"'),

        tabBar,
        div({background:CARD,borderRadius:"18px",border:"1px solid "+BOR,
             padding:"clamp(18px,4vw,30px)",boxShadow:"0 4px 24px rgba(26,10,0,0.06)"},tc),
        div({display:"flex",gap:"10px",marginTop:"14px"},[
          btn("Reiniciar",{flex:"1",background:"none",border:"1.5px solid "+BOR,color:MUT,
                          fontSize:"13px"},
              function(){set({qFase:"intro",qAi:0,qPi:0,qR1:{},qR2:{},
                              qTop3:[],qDom:null,qSub:null,qTab:"perfil"});}),
          btn("← Início",{flex:"1",fontSize:"13px"},
              function(){set({screen:"home",qFase:"intro"});})
        ]),
        el("p",{textAlign:"center",color:MUT,fontSize:"9px",marginTop:"18px",
                letterSpacing:"3px",textTransform:"uppercase",opacity:"0.4"},
           "Isabella Intelligence System · 2026")
      ])
    ]);
  }

  return div();
}

// ── MAIN ──────────────────────────────────────────────────────────────────────
function draw(){
  var app=document.getElementById("app");
  app.innerHTML="";
  var view;
  if(!S.user) view=drawLogin();
  else if(S.screen==="quiz") view=drawQuiz();
  else view=drawHome();
  app.appendChild(view);
}

if(S.user) S.screen="home";
draw();
</script>
